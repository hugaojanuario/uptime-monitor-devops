services:
  uptime-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PORT=${PORT:-8080}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-uptime}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_SSLMODE=disable
      - RESULTS_FILE=/data/results.txt
      - CHECK_TIMEOUT=${CHECK_TIMEOUT:-10s}
      - TZ=${TZ:-America/Sao_Paulo}
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  migrate:
    image: migrate/migrate
    command:
      - -path=/migrations
      - -database
      - postgres://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-uptime}?sslmode=disable
      - up
    volumes:
      - ./db/migrations:/migrations
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  postgres:
    image: postgres:16-alpine
    container_name: uptime-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-uptime}
      TZ: ${TZ:-America/Sao_Paulo}
      PGTZ: ${TZ:-America/Sao_Paulo}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME:-uptime}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
